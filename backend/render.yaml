services:
  - type: web
    name: multilingual-conference-backend
    runtime: node
    region: oregon
    plan: starter
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
